<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jambnaija | Activation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="activation">
  <div class="shell shell-narrow">
    <header class="topbar">
      <div class="brand">
        <div class="logo">JN</div>
        <div>
          <h1>Jambnaija Activation</h1>
          <p>Redeem your code to unlock your account.</p>
        </div>
      </div>
      <div class="toolbar">
        <span class="chip"><span class="pulse-dot"></span>Activation</span>
      </div>
    </header>

    <main>
      <section class="auth-single">
        <article class="card login-card">
          <div class="section-head">
            <h3>Activation Center</h3>
            <small>Code redemption</small>
          </div>
          <p id="activationStatus" class="note no-top">Login and redeem your activation code.</p>
          <form id="activationForm" class="form-grid" novalidate>
            <label class="field">
              <span>Activation code</span>
              <input id="activationCode" type="text" required placeholder="activate-std-22200001">
            </label>
            <label class="field">
              <span>Referral code (optional)</span>
              <input id="activationReferralCode" type="text" placeholder="JAMBNAIJA-REF...">
            </label>
            <button class="btn btn-primary interactive" type="submit">Redeem</button>
            <p id="activationMessage" class="message" aria-live="polite"></p>
          </form>
          <div class="auth-switch">
            <p>Need a code from admin?</p>
            <a id="getActivationCodeBtn" class="btn btn-soft interactive" href="#" target="_blank" rel="noopener noreferrer">Get Activation Code</a>
            <a id="activationBackBtn" class="btn btn-soft interactive" href="student.html">Back to Dashboard</a>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="app.js?v=20260305b"></script>
</body>
</html>
