<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jambnaija | Exam Result</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .result-layout {
      display: grid;
      gap: 16px;
    }

    .result-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .result-kpi {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 12px;
    }

    .result-kpi small {
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
      display: block;
    }

    .result-kpi strong {
      display: block;
      margin-top: 6px;
      font: 800 1.12rem/1 "Space Grotesk", sans-serif;
      color: var(--primary-strong);
    }

    .insight-list {
      display: grid;
      gap: 8px;
    }

    .insight-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .insight-item strong {
      font-size: 0.86rem;
    }

    .insight-item small {
      color: var(--muted);
      font-size: 0.73rem;
    }

    @media (max-width: 900px) {
      .result-metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .result-card-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .result-metrics {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page="result">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">JN</div>
        <div>
          <h1>Jambnaija Result Analytics</h1>
          <p>Overview, subject breakdown, and weak-topic insights.</p>
        </div>
      </div>
      <div class="toolbar">
        <button id="resultBackBtn" class="btn btn-soft" type="button">Back</button>
        <button id="resultLogoutBtn" class="btn btn-soft" type="button">Logout</button>
      </div>
    </header>

    <main class="result-layout">
      <section class="card">
        <div class="section-head">
          <h3 id="resultMode">Exam Result</h3>
          <small>Summary</small>
        </div>
        <p id="resultOverall" class="score-flat">-</p>
        <p id="resultMeta" class="message">-</p>
      </section>

      <section class="result-metrics">
        <article class="result-kpi"><small>Answered</small><strong id="resultAnswered">-</strong></article>
        <article class="result-kpi"><small>Correct</small><strong id="resultCorrect">-</strong></article>
        <article class="result-kpi"><small>Wrong</small><strong id="resultWrong">-</strong></article>
        <article class="result-kpi"><small>Unanswered</small><strong id="resultUnanswered">-</strong></article>
      </section>

      <section class="card result-card-grid">
        <div class="result-chart-wrap">
          <canvas id="resultPie" width="280" height="280"></canvas>
          <div class="result-legend">
            <span><i class="legend-dot legend-correct"></i>Correct</span>
            <span><i class="legend-dot legend-wrong"></i>Wrong</span>
            <span><i class="legend-dot legend-unanswered"></i>Unanswered</span>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Subject</th>
                <th>Correct</th>
                <th>Score (/100)</th>
                <th>Percent</th>
              </tr>
            </thead>
            <tbody id="resultTableBody"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js?v=20260304e"></script>
</body>
</html>
