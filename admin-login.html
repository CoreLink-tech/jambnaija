<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jambnaija | Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="admin-login">
  <div class="shell shell-narrow">
    <header class="topbar">
      <div class="brand">
        <div class="logo">JN</div>
        <div>
          <h1>Jambnaija Admin Access</h1>
          <p>Dedicated authentication channel for admin operators</p>
        </div>
      </div>
      <div class="toolbar">
        <span class="chip"><span class="pulse-dot"></span>Admin Auth</span>
      </div>
    </header>

    <main>
      <section class="card hero tilt">
        <div class="hero-top">
          <div>
            <p>Restricted area</p>
            <div class="score">Admin Login</div>
            <p>Authorized admin access only.</p>
          </div>
          <div class="ring"><span>OPS</span></div>
        </div>
      </section>

      <section class="auth-single">
        <article class="card login-card">
          <div class="section-head">
            <h3>Admin Login</h3>
            <small>Email + password</small>
          </div>
          <form id="adminLoginForm" class="form-grid" novalidate>
            <label class="field">
              <span>Email</span>
              <input id="adminLoginEmail" type="email" autocomplete="username" required placeholder="admin@jambnaija.ng">
            </label>
            <label class="field">
              <span>Password</span>
              <input id="adminLoginPassword" type="password" autocomplete="current-password" required placeholder="Enter password">
            </label>
            <p class="note no-top">If backend is offline, local admin fallback is available (default: admin@examforge.com / Admin12345).</p>
            <button class="btn btn-primary interactive" type="submit">Login as Admin</button>
            <p id="adminLoginMessage" class="message" aria-live="polite"></p>
          </form>
        </article>
      </section>
    </main>
  </div>

  <script src="app.js?v=20260305g"></script>
</body>
</html>
