services:
  - type: web
    name: testify-app
    env: node
    plan: free
    buildCommand: npm install && npm --prefix backend run prisma:migrate:deploy && npm --prefix backend run prisma:generate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_KEY
        sync: false
